name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0" # Wrapped in quotes to prevent YAML parsing errors
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build static site
        env:
          BASE_PATH: /dungeonseries/
        run: |
          npm run build
          BASE_PATH=/dungeonseries/ node scripts/generate-spa-index.js

      - name: Locate static output
        id: out
        run: |
          dir=dist/client
          if [ ! -f "$dir/index.html" ]; then
            echo "Expected $dir/index.html to exist after build" >&2
            ls -la "$dir" || true
            exit 1
          fi
          echo "dir=$dir" >> "$GITHUB_OUTPUT"


      - name: Add SPA fallback (404.html) and .nojekyll
        run: |
          cp "${{ steps.out.outputs.dir }}/index.html" "${{ steps.out.outputs.dir }}/404.html"
          touch "${{ steps.out.outputs.dir }}/.nojekyll"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.out.outputs.dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
