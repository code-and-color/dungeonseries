name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0" # Wrapped in quotes to prevent YAML parsing errors
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build static site
        env:
          BASE_PATH: /dungeonseries/
          STATIC_EXPORT: "true"
        run: npm run build

      - name: Locate static output
        id: out
        run: |
          # Checks default TanStack `.output/public` target first, falls back to `dist/client`
          for dir in .output/public dist/client dist build; do
            if [ -d "$dir" ] && [ -f "$dir/index.html" ]; then
              echo "dir=$dir" >> "$GITHUB_OUTPUT"
              echo "Found static output at $dir"
              exit 0
            fi
          done
          echo "No static output with index.html found. Listing candidates:" >&2
          ls -la dist dist/client .output .output/public 2>/dev/null || true
          exit 1

      - name: Add SPA fallback (404.html) and .nojekyll
        run: |
          cp "${{ steps.out.outputs.dir }}/index.html" "${{ steps.out.outputs.dir }}/404.html"
          touch "${{ steps.out.outputs.dir }}/.nojekyll"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.out.outputs.dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
