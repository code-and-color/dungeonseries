      - name: Build static site
        env:
          BASE_PATH: /dungeonseries/
          STATIC_EXPORT: "true"
        run: npm run build

      - name: Locate static output
        id: out
        run: |
          # Point directly to TanStack Start's default production generation target
          if [ -d ".output/public" ] && [ -f ".output/public/index.html" ]; then
            echo "dir=.output/public" >> "$GITHUB_OUTPUT"
            echo "Found static output at .output/public"
            exit 0
          fi
          echo "No static output found. Listing candidates:" >&2
          ls -la dist dist/client .output .output/public 2>/dev/null || true
          exit 1
